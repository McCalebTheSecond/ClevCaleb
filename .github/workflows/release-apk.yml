name: Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "versionName (e.g. 1.0.5)"
        required: true
        type: string
      version_code:
        description: "versionCode (integer)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Resolve version from tag or inputs
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
            VERSION_CODE=$(grep versionCode app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          else
            VERSION_NAME="${{ inputs.version_name }}"
            VERSION_CODE="${{ inputs.version_code }}"
            sed -i "s/versionCode = [0-9]*/versionCode = ${VERSION_CODE}/" app/build.gradle.kts
            sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VERSION_NAME}\"/" app/build.gradle.kts
          fi
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > keystore/clevcaleb-release.jks
          test -s keystore/clevcaleb-release.jks

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build signed release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)"
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk
          ls -lh app/build/outputs/apk/release/app-release.apk

      - name: Package release asset
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            "ClevCaleb-v${{ steps.version.outputs.version_name }}.apk"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "ClevCaleb-v${{ steps.version.outputs.version_name }}.apk" --clobber
          else
            gh release create "$TAG" \
              --title "ClevCaleb v${{ steps.version.outputs.version_name }}" \
              --notes-file release-notes.md \
              "ClevCaleb-v${{ steps.version.outputs.version_name }}.apk"
          fi
